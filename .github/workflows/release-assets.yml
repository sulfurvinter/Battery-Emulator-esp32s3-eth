# 2026-07-04: Rewritten by Claude — simplified for single esp32s3_generic_330 target
name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v10.12.0)'
        required: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Set release tag
      id: vars
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout code at tag
      uses: actions/checkout@v4
      with:
        ref: refs/tags/${{ steps.vars.outputs.tag }}

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    - name: Build esp32s3_generic_330
      run: pio run -e esp32s3_generic_330

    - name: Collect artifacts
      run: |
        mkdir output
        cp .pio/build/esp32s3_generic_330/firmware.factory.bin \
           output/BE_${{ steps.vars.outputs.tag }}_ESP32S3Generic.factory.bin
        cp .pio/build/esp32s3_generic_330/firmware.bin \
           output/BE_${{ steps.vars.outputs.tag }}_ESP32S3Generic.ota.bin

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.vars.outputs.tag }}
        files: |
          output/*.factory.bin
          output/*.ota.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
